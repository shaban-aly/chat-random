<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أنت غير متصل | Random Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1115;
      color: #f0f2f5;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.75rem; font-weight: 900; margin-bottom: 0.75rem; }
    p { color: #94a3b8; font-size: 1rem; line-height: 1.6; max-width: 300px; }
    button {
      margin-top: 2rem;
      padding: 0.875rem 2rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #818cf8; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>أنت غير متصل بالإنترنت</h1>
  <p>يحتاج التطبيق إلى اتصال بالإنترنت للعمل. تحقق من اتصالك وحاول مجدداً.</p>
  <button onclick="window.location.reload()">إعادة المحاولة</button>
</body>
</html>
